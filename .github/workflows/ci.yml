name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    services:
      # Used by E2E tests; integration tests use testcontainers (self-contained)
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_tracker_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d job_tracker_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: backend
          version: v2.11.4

      - name: Unit tests
        run: cd backend && go test ./internal/... -count=1 -race

      - name: Integration tests
        # testcontainers spawns its own postgres — no DB_DSN needed here
        # Skip gracefully until tests/integration/ is scaffolded (PR-19)
        run: |
          if [ -d "backend/tests/integration" ]; then
            cd backend && go test ./tests/integration/... -count=1
          else
            echo "tests/integration not yet scaffolded — skipping"
          fi
        env:
          REDIS_ADDR: localhost:6379

      - name: E2E smoke test
        # Skip gracefully until tests/e2e/ is scaffolded (PR-19)
        run: |
          if [ -d "backend/tests/e2e" ]; then
            cd backend && go test ./tests/e2e/... -count=1
          else
            echo "tests/e2e not yet scaffolded — skipping"
          fi
        env:
          DB_DSN: postgres://postgres:postgres@localhost:5432/job_tracker_test?sslmode=disable
          REDIS_ADDR: localhost:6379
          JWT_SECRET: ci-test-secret
          JWT_EXPIRY: 24h
          PORT: 3000

      - name: Build binary
        run: cd backend && CGO_ENABLED=0 GOOS=linux go build -o /dev/null ./cmd/api

  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if frontend is scaffolded
        id: frontend-check
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Frontend not yet scaffolded — skipping checks"
          fi

      - uses: actions/setup-node@v4
        if: steps.frontend-check.outputs.exists == 'true'
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.frontend-check.outputs.exists == 'true'
        run: cd frontend && npm ci

      - name: TypeScript check
        if: steps.frontend-check.outputs.exists == 'true'
        run: cd frontend && npx tsc --noEmit

      - name: Build
        if: steps.frontend-check.outputs.exists == 'true'
        run: cd frontend && npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_tracker_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d job_tracker_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DB_DSN: postgres://postgres:postgres@localhost:5432/job_tracker_e2e?sslmode=disable
      REDIS_ADDR: localhost:6379
      JWT_SECRET: e2e-playwright-secret-key-at-least-32chars
      JWT_EXPIRY: 24h
      PORT: 3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium --with-deps

      - name: Install golang-migrate
        run: go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
        working-directory: backend

      - name: Apply migrations
        run: migrate -path backend/migrations -database "$DB_DSN" up

      - name: Build and start backend
        run: |
          cd backend && go build -o /tmp/api-server ./cmd/api
          /tmp/api-server &

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3001/api/v1/health && echo "Backend ready" && break
            sleep 2
          done

      - name: Start frontend dev server
        run: cd frontend && npm run dev &

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:5173 > /dev/null && echo "Frontend ready" && break
            sleep 2
          done

      - name: Run Playwright tests
        run: cd frontend && npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  auto-merge:
    name: Auto-merge dependabot PRs
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
      - run: gh pr merge --squash --auto "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
