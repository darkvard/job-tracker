name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    services:
      # Used by E2E tests; integration tests use testcontainers (self-contained)
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: job_tracker_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d job_tracker_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:8-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: backend
          version: v2.11.4

      - name: Unit tests
        run: cd backend && go test ./internal/... -count=1 -race

      - name: Integration tests
        # testcontainers spawns its own postgres — no DB_DSN needed here
        run: cd backend && go test ./tests/integration/... -count=1
        env:
          REDIS_ADDR: localhost:6379

      - name: E2E smoke test
        run: cd backend && go test ./tests/e2e/... -count=1
        env:
          DB_DSN: postgres://postgres:postgres@localhost:5432/job_tracker_test?sslmode=disable
          REDIS_ADDR: localhost:6379
          JWT_SECRET: ci-test-secret
          JWT_EXPIRY: 24h
          PORT: 3000

      - name: Build binary
        run: cd backend && CGO_ENABLED=0 GOOS=linux go build -o /dev/null ./cmd/api

  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check if frontend is scaffolded
        id: frontend-check
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Frontend not yet scaffolded — skipping checks"
          fi

      - uses: actions/setup-node@v4
        if: steps.frontend-check.outputs.exists == 'true'
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.frontend-check.outputs.exists == 'true'
        run: cd frontend && npm ci

      - name: TypeScript check
        if: steps.frontend-check.outputs.exists == 'true'
        run: cd frontend && npx tsc --noEmit

      - name: Build
        if: steps.frontend-check.outputs.exists == 'true'
        run: cd frontend && npm run build

  auto-merge:
    name: Auto-merge dependabot PRs
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
      - run: gh pr merge --squash --auto "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
