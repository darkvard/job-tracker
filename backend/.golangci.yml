run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - exhaustive    # ensures all switch cases covered for enums

linters-settings:
  goimports:
    local-prefixes: job-tracker
  exhaustive:
    default-signifies-exhaustive: true
