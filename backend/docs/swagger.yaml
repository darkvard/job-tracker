basePath: /api/v1
definitions:
  internal_infrastructure_http_handler.errorBody:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  internal_infrastructure_http_handler.errorResponse:
    properties:
      error:
        $ref: '#/definitions/internal_infrastructure_http_handler.errorBody'
      success:
        type: boolean
    type: object
  internal_infrastructure_http_handler.paginatedResponse:
    properties:
      data: {}
      meta:
        $ref: '#/definitions/internal_infrastructure_http_handler.paginationMeta'
      success:
        type: boolean
    type: object
  internal_infrastructure_http_handler.paginationMeta:
    properties:
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
      totalPages:
        type: integer
    type: object
  internal_infrastructure_http_handler.successResponse:
    properties:
      data: {}
      success:
        type: boolean
    type: object
  internal_infrastructure_http_handler.weeklyResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/job-tracker_internal_application_analytics.WeeklyData'
        type: array
      success:
        type: boolean
      trend:
        $ref: '#/definitions/job-tracker_internal_application_analytics.TrendValue'
    type: object
  job-tracker_internal_application_analytics.DashboardKPIs:
    properties:
      applied:
        type: integer
      interview:
        type: integer
      offer:
        type: integer
      recentJobs:
        items:
          $ref: '#/definitions/job-tracker_internal_application_analytics.RecentJob'
        type: array
      rejected:
        type: integer
      statusBreakdown:
        items:
          $ref: '#/definitions/job-tracker_internal_application_analytics.StatusBreakdownItem'
        type: array
      total:
        type: integer
      trends:
        $ref: '#/definitions/job-tracker_internal_application_analytics.DashboardTrends'
    type: object
  job-tracker_internal_application_analytics.DashboardTrends:
    properties:
      interview:
        $ref: '#/definitions/job-tracker_internal_application_analytics.TrendValue'
      offer:
        $ref: '#/definitions/job-tracker_internal_application_analytics.TrendValue'
      rejected:
        $ref: '#/definitions/job-tracker_internal_application_analytics.TrendValue'
      total:
        $ref: '#/definitions/job-tracker_internal_application_analytics.TrendValue'
    type: object
  job-tracker_internal_application_analytics.FunnelData:
    properties:
      name:
        type: string
      rate:
        type: number
      value:
        type: integer
    type: object
  job-tracker_internal_application_analytics.KeyMetrics:
    properties:
      avgResponseDays:
        type: number
      interviewRate:
        type: number
      offerRate:
        type: number
      rejectionRate:
        type: number
    type: object
  job-tracker_internal_application_analytics.RecentJob:
    properties:
      company:
        type: string
      dateApplied:
        type: string
      id:
        type: integer
      role:
        type: string
      status:
        type: string
    type: object
  job-tracker_internal_application_analytics.SourceData:
    properties:
      count:
        type: integer
      percentage:
        type: number
      source:
        type: string
    type: object
  job-tracker_internal_application_analytics.StatusBreakdownItem:
    properties:
      color:
        type: string
      count:
        type: integer
      status:
        type: string
    type: object
  job-tracker_internal_application_analytics.TrendValue:
    properties:
      isPositive:
        type: boolean
      value:
        type: number
    type: object
  job-tracker_internal_application_analytics.WeeklyData:
    properties:
      applications:
        type: integer
      startDate:
        type: string
      week:
        type: string
    type: object
  job-tracker_internal_application_auth.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/job-tracker_internal_application_auth.UserInfo'
    type: object
  job-tracker_internal_application_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  job-tracker_internal_application_auth.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  job-tracker_internal_application_auth.UpdateProfileRequest:
    properties:
      currentCompany:
        type: string
      currentLocation:
        type: string
      currentRole:
        type: string
      currentSalary:
        format: int64
        type: integer
      name:
        type: string
      salaryCurrency:
        type: string
    type: object
  job-tracker_internal_application_auth.UserInfo:
    properties:
      createdAt:
        type: string
      currentCompany:
        type: string
      currentLocation:
        type: string
      currentRole:
        type: string
      currentSalary:
        type: integer
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      salaryCurrency:
        type: string
    type: object
  job-tracker_internal_application_job.CreateRequest:
    properties:
      company:
        type: string
      dateApplied:
        type: string
      location:
        type: string
      notes:
        type: string
      role:
        type: string
      source:
        type: string
      status:
        type: string
      userID:
        format: int64
        type: integer
    type: object
  job-tracker_internal_application_job.JobResponse:
    properties:
      company:
        type: string
      createdAt:
        type: string
      dateApplied:
        type: string
      id:
        type: integer
      location:
        type: string
      notes:
        type: string
      role:
        type: string
      source:
        type: string
      status:
        type: string
      statusHistory:
        items:
          $ref: '#/definitions/job-tracker_internal_application_job.StatusHistoryItem'
        type: array
      updatedAt:
        type: string
      userId:
        type: integer
    type: object
  job-tracker_internal_application_job.StatusHistoryItem:
    properties:
      changedAt:
        type: string
      fromStatus:
        type: string
      id:
        type: integer
      note:
        type: string
      toStatus:
        type: string
    type: object
  job-tracker_internal_application_job.UpdateRequest:
    properties:
      company:
        type: string
      dateApplied:
        type: string
      id:
        format: int64
        type: integer
      location:
        type: string
      notes:
        type: string
      role:
        type: string
      source:
        type: string
      status:
        type: string
      userID:
        format: int64
        type: integer
    type: object
  job-tracker_internal_application_job.UpdateStatusRequest:
    properties:
      id:
        format: int64
        type: integer
      note:
        type: string
      status:
        type: string
      userID:
        format: int64
        type: integer
    type: object
host: localhost:3001
info:
  contact: {}
  description: Single-user job application tracker API.
  title: Job Tracker API
  version: 1.0.0
paths:
  /analytics/funnel:
    get:
      description: Returns Applied → Interview → Offer conversion funnel data, cached
        per user (TTL 10 min)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/job-tracker_internal_application_analytics.FunnelData'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Get interview conversion funnel
      tags:
      - analytics
  /analytics/metrics:
    get:
      description: Returns interview rate, offer rate, rejection rate and average
        response time, cached per user (TTL 10 min)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/job-tracker_internal_application_analytics.KeyMetrics'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Get key metrics
      tags:
      - analytics
  /analytics/sources:
    get:
      description: Returns application counts and percentages grouped by source, cached
        per user (TTL 10 min)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/job-tracker_internal_application_analytics.SourceData'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Get source performance breakdown
      tags:
      - analytics
  /analytics/weekly:
    get:
      description: Returns application counts per week for the last 6 weeks with a
        trend, cached per user (TTL 10 min)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.weeklyResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Get weekly application counts
      tags:
      - analytics
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password, receive a JWT token
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/job-tracker_internal_application_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/job-tracker_internal_application_auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      summary: Login
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the profile of the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/job-tracker_internal_application_auth.UserInfo'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
    put:
      consumes:
      - application/json
      description: Updates the profile fields of the authenticated user
      parameters:
      - description: Update profile payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/job-tracker_internal_application_auth.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/job-tracker_internal_application_auth.UserInfo'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Update current user profile
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new account and receive a JWT token
      parameters:
      - description: Register payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/job-tracker_internal_application_auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/job-tracker_internal_application_auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      summary: Register a new user
      tags:
      - auth
  /dashboard/kpis:
    get:
      description: Returns aggregated KPI metrics for the authenticated user's job
        applications, cached per user (TTL 5 min)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/job-tracker_internal_application_analytics.DashboardKPIs'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Get dashboard KPIs
      tags:
      - dashboard
  /health:
    get:
      description: Returns API health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.successResponse'
      summary: Health check
      tags:
      - health
  /jobs:
    get:
      description: Return a paginated, filtered list of job applications for the authenticated
        user
      parameters:
      - description: Filter by status (Applied|Interview|Offer|Rejected)
        in: query
        name: status
        type: string
      - description: Search by company or role (case-insensitive)
        in: query
        name: search
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: page_size
        type: integer
      - description: 'Sort column: company|date_applied|created_at (default created_at)'
        in: query
        name: sort_by
        type: string
      - description: 'Sort direction: asc|desc (default desc)'
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.paginatedResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: List job applications
      tags:
      - jobs
    post:
      consumes:
      - application/json
      description: Create a new job application for the authenticated user
      parameters:
      - description: Create job payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/job-tracker_internal_application_job.CreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/job-tracker_internal_application_job.JobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Create a job application
      tags:
      - jobs
  /jobs/{id}:
    delete:
      description: Permanently delete a job application owned by the authenticated
        user
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Delete a job application
      tags:
      - jobs
    get:
      description: Return a single job application by ID with status history
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/job-tracker_internal_application_job.JobResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Get a job application
      tags:
      - jobs
    put:
      consumes:
      - application/json
      description: Full-replace update of a job application (all fields required)
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update job payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/job-tracker_internal_application_job.UpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/job-tracker_internal_application_job.JobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Update a job application
      tags:
      - jobs
  /jobs/{id}/status:
    patch:
      consumes:
      - application/json
      description: Transition a job application to a new status (enforces valid transition
        rules)
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update status payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/job-tracker_internal_application_job.UpdateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/job-tracker_internal_application_job.JobResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/internal_infrastructure_http_handler.errorResponse'
      security:
      - BearerAuth: []
      summary: Update job application status
      tags:
      - jobs
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
